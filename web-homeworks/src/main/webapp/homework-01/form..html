<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        /* 容器 */
        .main {
            border: 1px solid red;
            width: 800px;
            padding: 15px;
            margin: auto;
        }

        input[type="text"]{
            width:100%;
            border-radius: 3px;
            outline:none;
            border-style: none;
            border-bottom: solid;
        }
        input[type="password"] {
            width: 100%;
            border-radius: 3px;
            border-style: none;
            outline: none;
            border-bottom: solid;
        }
        .form-group{
            padding:10px 5px;
            position: relative;
        }
        .form-label{
            font-size: 0.5em;
            position: absolute;
            left:0;
            top:10px;
            pointer-events: none;
        }
        div.form-input input:focus {
            border-bottom-color: orange;
        }
        div.form-input input:focus + label{
            top:1px;
        }
    </style>
</head>
<body>
<div class="main">
    <form>
        <div class="form-group">
            <div class="form-input">
                <input type="text">
                <label class="form-label">用户名</label>
            </div>
        </div>

        <div class="form-group">
            <div class="form-input">
                <input type="password">
                <label class="form-label">密码</label>
            </div>
        </div>

        <div class="form-group">
            <div class="form-input">
                <label class="form-label2">性别</label>
                <input type="radio" name="sex">男
                <input type="radio" name="sex">女
            </div>
        </div>
    </form>
</div>
</body>
</html>
