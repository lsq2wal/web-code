<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            padding: 0;
            margin:0;
            box-sizing: border-box;
        }
        aside
        {
            background-color: #f2f2f2;
            width:300px;
        }
        .sidebar > h2:hover {
            cursor: pointer;
            background: #000;
        }
        .sidebar ul {
            display: none;
        }
        .sidebar>h2
        {
            padding: 15px 20px;
            background-color: #3185bf;
            color:white;
        }
        .sidebar a{
            display: block;
            padding: 15px 20px;
            text-decoration: none;
            color: black;
            transition: transform 2s;
        }
        .sidebar a:hover
        {
            transform:scale(1.1);
            background-color: #3185bf;
        }

    </style>
</head>
<body>
<aside>
    <div class="sidebar">
        <h2>云技术管理</h2>
        <ul>
            <li><a href="#">云服务器</a></li>
            <li><a href="#">云数据库</a></li>
            <li><a href="#">负载均衡</a></li>
        </ul>
    </div>
    <div class="sidebar">
        <h2>安全管理</h2>
        <ul>
            <li><a href="#">云盾控制台</a></li>
            <li><a href="#">DDoS高防IP</a></li>
            <li><a href="#">Web应用防火墙</a></li>
            <li><a href="#">CA证书服务</a></li>
        </ul>
    </div>
</aside>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script>
    $(function (){
        $(".sidebar > h2").click(function (){
            let ul = $(this).next("ul");
            ul.slideToggle();
            $(".sidebar > ul").not(ul).slideUp();
        })

    })

</script>
</body>
</html>
